<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Cronômetro</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <main class="container">
            <section id="total-time">
                <h2>Tempo Total</h2>
                <div class="display" id="total-display">00:00</div>
                <button onclick="restartTimer()" id="restart">Reiniciar tempo total</button>
            </section>

            <section id="now">
                <h2>Sessão Atual</h2>
                <div class="display" id="time">00:00</div>
                <button onclick="toggleTimer()" id="symbol">▶</button>
            </section>
        </main>
        
        <script src="script.js"></script>
    </body>
</html>

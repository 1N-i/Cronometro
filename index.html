<html>
    <head>
        <title>Chronometer</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div id="total-time">
            <a>Total time: </a>
            <a>00:00</a>
        </div>

        <div id="now">
            <a>Time: </a>
            <a id="time">00:00</a>
            <br>
            <button onclick="time()" id="symbol">▶</button>
        </div>
        
        <script src="script.js"></script>
    </body>
</html>
